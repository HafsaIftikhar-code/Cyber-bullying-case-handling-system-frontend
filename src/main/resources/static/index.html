<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberbullying Handling System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        .status {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #28a745;
        }

        .status h3 {
            color: #28a745;
            margin-bottom: 5px;
        }

        .status p {
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>Cyberbullying Handling System</h1>
        <p class="subtitle">Secure reporting platform with priority-based case management</p>

        <div class="buttons">
            <a href="C2/user.html" class="btn btn-primary">👤 User Portal</a>
            <a href="C2/admin.html" class="btn btn-secondary">⚙️ Admin Portal</a>
        </div>

        <div style="margin-top: 20px;">
            <a href="admin-test.html" style="color: #666; text-decoration: underline; font-size: 14px;">🧪 Test Admin Dashboard</a>
        </div>

        <div class="status" id="backend-status">
            <h3>🔄 Checking Backend Status...</h3>
            <p>Connecting to Java Spring Boot API</p>
        </div>
    </div>

    <script>
        // Check backend status on page load
        async function checkBackendStatus() {
            try {
                const response = await fetch('/api/test');
                if (response.ok) {
                    document.getElementById('backend-status').innerHTML = `
                        <h3>✅ Backend Connected</h3>
                        <p>Java Spring Boot API is running on port 8080</p>
                    `;
                } else {
                    throw new Error('Backend not responding');
                }
            } catch (error) {
                document.getElementById('backend-status').innerHTML = `
                    <h3 style="color: #dc3545;">❌ Backend Offline</h3>
                    <p>Please start the Java backend server</p>
                `;
            }
        }

        // Check status when page loads
        window.addEventListener('DOMContentLoaded', checkBackendStatus);
    </script>
</body>
</html>
